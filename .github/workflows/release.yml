name: Release

# Version-bump → release via npm Trusted Publishers (OIDC — no token, no OTP).
# On every push to main, if package.json's "version" changed versus the
# previous commit (and no tag exists for it yet), build, test, tag, create a
# GitHub Release, and publish to npm authenticated by GitHub OIDC.
#
# Requires a per-package Trusted Publisher on npmjs.com (already configured):
#   provider GitHub Actions, repo 7onnie/homebridge-mammotion-ng, workflow
#   release.yml. Once a Trusted Publisher is set, npm rejects token publishes
#   for the package, so OIDC is the path. Nothing publishes until a version bump.

on:
  push:
    branches: [main]
    paths: ['package.json']

permissions:
  contents: write   # create tags + GitHub Releases
  id-token: write   # OIDC token for npm Trusted Publishers + provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for version diff + tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20 (npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Node 20 ships npm 10.x; npm Trusted Publishers OIDC needs >= 11.5.1.
      - name: Upgrade npm (OIDC trusted publishing support)
        run: npm install -g npm@latest

      - name: Detect version bump
        id: bump
        run: |
          NEW=$(node -p "require('./package.json').version")
          git show HEAD~1:package.json > /tmp/old-package.json 2>/dev/null || echo '{}' > /tmp/old-package.json
          OLD=$(node -p "require('/tmp/old-package.json').version || 'none'")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          if [ "$NEW" != "$OLD" ] && ! git rev-parse "v$NEW" >/dev/null 2>&1; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $OLD -> $NEW (will release v$NEW)"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "No new version to release (old=$OLD new=$NEW)."
          fi

      # --ignore-scripts: the package's postinstall provisions a Python venv for
      # the end-user's Homebridge host, which must not run in CI.
      - name: Install dependencies
        if: steps.bump.outputs.release == 'true'
        run: npm ci --ignore-scripts

      - name: Build
        if: steps.bump.outputs.release == 'true'
        run: npm run build

      - name: Test
        if: steps.bump.outputs.release == 'true'
        run: npx vitest run

      - name: Tag + GitHub Release
        if: steps.bump.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.bump.outputs.new }}"
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --title "$VERSION" --generate-notes

      # No NODE_AUTH_TOKEN: OIDC (id-token: write) + the npmjs.com Trusted
      # Publisher authenticate this publish, and OIDC bypasses 2FA/OTP.
      - name: Publish to npm (Trusted Publishers / OIDC)
        if: steps.bump.outputs.release == 'true'
        run: npm publish --provenance --access public
